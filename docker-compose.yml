services:
  notifications-api:
    build:
      context: .
      dockerfile: NotificationsAPI/Dockerfile

    image: notifications-api
    container_name: notifications-api

    ports:
      - "8083:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"

      RabbitMq__Host: "host.docker.internal"
      RabbitMq__Username: "fcguser"
      RabbitMq__Password: "FcgRabbit@2026"

    restart: unless-stopped